<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Women Safety AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#ff4081">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <h1>🛡️ SafeHer</h1>
                <p>AI-Powered Women Safety</p>
            </div>
        </header>

        <!-- Status Display -->
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">🟢</div>
            <div class="status-text">
                <h3 id="statusText">Safe Mode</h3>
                <p id="statusSubtext">Ready to protect you</p>
            </div>
        </div>

        <!-- 🔥 UPGRADED BUTTON GRID -->
        <div class="button-grid">
            <button class="btn-emergency" id="emergencyBtn">
                🚨 EMERGENCY SOS
            </button>
            <button class="btn-alert" id="silentAlertBtn">
                🤫 Silent Alert
            </button>
            <button class="btn-track" id="liveTrackBtn">
                📍 Live Track ON
            </button>
            <button class="btn-contacts" id="quickContactsBtn">
                📞 Quick Contacts
            </button>
        </div>

        <!-- Live Location Status -->
        <div class="location-card" id="locationCard" style="display: none;">
            <h4>📍 Live Location Active</h4>
            <p id="currentLocation">-</p>
            <button class="btn-stop" id="stopTrackingBtn">Stop Tracking</button>
        </div>

        <!-- 👈 NEW: CUSTOMIZABLE CONTACTS -->
        <div class="contacts-panel" id="contactsPanel" style="display: none;">
            <div class="contacts-header">
                <h4>📞 Emergency Contacts</h4>
                <button class="edit-btn" id="editContactsBtn">✏️ Edit</button>
            </div>
            
            <!-- Saved Contacts Display -->
            <div class="contact-list" id="savedContactsList">
                <!-- Dynamic contacts load here -->
            </div>
            
            <!-- Edit Form -->
            <div class="edit-form" id="editForm" style="display: none;">
                <input type="tel" id="contactName1" placeholder="Name (Mom)" maxlength="20">
                <input type="tel" id="contactPhone1" placeholder="Phone (+919876543210)" maxlength="15">
                <input type="tel" id="contactName2" placeholder="Name (Dad)" maxlength="20">
                <input type="tel" id="contactPhone2" placeholder="Phone (+919112233445)" maxlength="15">
                <div class="form-buttons">
                    <button class="btn-save" id="saveContactsBtn">💾 Save</button>
                    <button class="btn-cancel" id="cancelEditBtn">❌ Cancel</button>
                </div>
            </div>
        </div>

        <!-- Notification Log -->
        <div class="log-panel">
            <h4>📋 Recent Alerts</h4>
            <div id="alertLog"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
